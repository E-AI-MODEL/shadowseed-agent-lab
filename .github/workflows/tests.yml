name: tests

on:
  push:
  pull_request:
  workflow_dispatch:
  # Catch upstream SSL drift even when the lab itself is not changing: SSL is
  # merged directly to its main, so re-run the contract check on a schedule.
  schedule:
    - cron: "0 6 * * 1"

jobs:
  test:
    name: unittest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # Installs upstream E-AI-MODEL/shadowseed@main via the git dependency in
      # pyproject.toml. This is the drift gate: every run builds against the
      # current SSL main and runs tests/test_upstream_integration.py, which
      # fails if the shadowseed_agent safety contract changes shape.
      - name: Install (with upstream SSL from main)
        run: pip install -e ".[test]"

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Loop smoke test
        run: shadowseed-agent-lab --json
